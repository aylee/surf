name: Bug report
description: Report a reproducible product, data, or self-hosting problem.
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        For vulnerabilities, use the private security advisory link instead of this form.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include the smallest clear description of the failure.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: List exact commands, URL path, spot, and time. Redact tokens and account IDs.
      placeholder: |
        1. Fresh clone at commit …
        2. Run …
        3. Open …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: git rev-parse --short HEAD
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node/pnpm/Python versions, local or Cloudflare, and browser if relevant.
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: Forecast/source context
      description: Spot, provider/source ID, forecast valid time, source freshness, and caveats if this is a data issue.

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste only the minimal evidence. Do not include secrets or private Cloudflare identifiers.
